<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa de Ríos Roulette</title>
<link rel="stylesheet" href="styles-casa.css" />
</head>

<body class="roulette-page">
<header class="casino-header">
  <div class="logo-mark">R</div>
  <div>
    <h1>Casa de Ríos</h1>
    <p>Roulette</p>
  </div>
</header>

<main class="roulette-wrap">
  <section class="wheel-card">
    <div id="wheel" class="roulette-wheel">
      <div id="ball" class="roulette-ball"></div>
      <div class="wheel-center">R</div>
    </div>
    <div id="result" class="result-box">Place your bet</div>
  </section>

  <section class="controls-card">
    <div class="money-row">
      <span>Balance: <b id="balance">5000</b></span>
      <span>Bet: <b id="betAmount">100</b></span>
    </div>

    <div class="chip-row">
      <button onclick="setBet(50)">50</button>
      <button onclick="setBet(100)">100</button>
      <button onclick="setBet(250)">250</button>
      <button onclick="setBet(500)">500</button>
    </div>

    <h2>Betting Table</h2>

    <div class="number-grid">
      <button class="green" onclick="placeBet('number',0)">0</button>
      <script>
        for (let i = 1; i <= 36; i++) {
          const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
          const color = redNums.includes(i) ? 'red' : 'black';
          document.write(`<button class="${color}" onclick="placeBet('number',${i})">${i}</button>`);
        }
      </script>
    </div>

    <div class="outside-bets">
      <button onclick="placeBet('color','red')">Red</button>
      <button onclick="placeBet('color','black')">Black</button>
      <button onclick="placeBet('green','green')">Green / 0</button>

      <button onclick="placeBet('oddEven','odd')">Odd</button>
      <button onclick="placeBet('oddEven','even')">Even</button>

      <button onclick="placeBet('range','low')">1–18</button>
      <button onclick="placeBet('range','high')">19–36</button>

      <button onclick="placeBet('dozen',1)">1st 12</button>
      <button onclick="placeBet('dozen',2)">2nd 12</button>
      <button onclick="placeBet('dozen',3)">3rd 12</button>
    </div>

    <button id="spinBtn" class="spin-btn" onclick="spinRoulette()">Spin</button>
  </section>
</main>

<script>
let balance = 5000;
let betAmount = 100;
let currentBet = null;

const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

function setBet(amount) {
  betAmount = amount;
  document.getElementById("betAmount").textContent = betAmount;
}

function placeBet(type, value) {
  currentBet = { type, value };
  document.getElementById("result").textContent = `Bet placed: ${value}`;
}

function spinRoulette() {
  if (!currentBet) {
    document.getElementById("result").textContent = "Choose a bet first.";
    return;
  }

  if (balance < betAmount) {
    document.getElementById("result").textContent = "Not enough balance.";
    return;
  }

  balance -= betAmount;
  updateBalance();

  const spinBtn = document.getElementById("spinBtn");
  const wheel = document.getElementById("wheel");
  const ball = document.getElementById("ball");

  spinBtn.disabled = true;

  const winningNumber = Math.floor(Math.random() * 37);
  const winningColor = winningNumber === 0 ? "green" : redNums.includes(winningNumber) ? "red" : "black";

  const finalAngle = 3600 + winningNumber * 9.73;

  wheel.style.transform = `rotate(${finalAngle}deg)`;
  ball.style.transform = `rotate(${-finalAngle * 1.4}deg) translateY(-115px)`;

  setTimeout(() => {
    const won = checkWin(winningNumber, winningColor);
    let payout = 0;

    if (won) {
      payout = getPayout();
      balance += betAmount * payout;
    }

    updateBalance();

    document.getElementById("result").innerHTML =
      `Landed on <b class="${winningColor}Text">${winningNumber}</b> ${winningColor.toUpperCase()}<br>` +
      (won ? `You won ${betAmount * payout}!` : `You lost ${betAmount}.`);

    spinBtn.disabled = false;
  }, 3200);
}

function checkWin(num, color) {
  const bet = currentBet;

  if (bet.type === "number") return num === bet.value;
  if (bet.type === "color") return color === bet.value;
  if (bet.type === "green") return num === 0;
  if (bet.type === "oddEven") {
    if (num === 0) return false;
    return bet.value === "odd" ? num % 2 === 1 : num % 2 === 0;
  }
  if (bet.type === "range") {
    if (num === 0) return false;
    return bet.value === "low" ? num >= 1 && num <= 18 : num >= 19 && num <= 36;
  }
  if (bet.type === "dozen") {
    if (num === 0) return false;
    if (bet.value === 1) return num >= 1 && num <= 12;
    if (bet.value === 2) return num >= 13 && num <= 24;
    if (bet.value === 3) return num >= 25 && num <= 36;
  }

  return false;
}

function getPayout() {
  if (currentBet.type === "number" || currentBet.type === "green") return 36;
  if (currentBet.type === "dozen") return 3;
  return 2;
}

function updateBalance() {
  document.getElementById("balance").textContent = balance;
}
</script>
</body>
</html>
