<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa de Ríos Roulette</title>
  <link rel="stylesheet" href="roulette.css" />
</head>
<body>
  <main class="rios-roulette" aria-label="Casa de Ríos Roulette">
    <img class="roulette-bg" src="assets/roulette-bg.png" alt="Casa de Ríos Roulette interface" />

    <section class="game-layer">
      <div class="hud balance-box">
        <span>BALANCE</span>
        <strong id="balance">$5,000.00</strong>
      </div>

      <div class="hud win-box">
        <span>LAST WIN</span>
        <strong id="lastWin">--</strong>
        <em id="lastColor">PLACE BET</em>
      </div>

      <div class="hud bet-box">
        <span>TOTAL BET</span>
        <strong id="totalBet">$100.00</strong>
      </div>

      <div class="wheel-window">
        <div id="wheel" class="coded-wheel">
          <div class="wheel-numbers"></div>
          <div class="wheel-spindle"></div>
        </div>
        <div id="ballOrbit" class="ball-orbit"><div class="ball"></div></div>
      </div>

      <div class="board-hotspots" aria-label="Betting table">
        <button class="hotspot bet-0" data-type="number" data-value="0">0</button>
        <button class="hotspot n1" data-type="number" data-value="1">1</button>
        <button class="hotspot n2" data-type="number" data-value="2">2</button>
        <button class="hotspot n3" data-type="number" data-value="3">3</button>
        <button class="hotspot n4" data-type="number" data-value="4">4</button>
        <button class="hotspot n5" data-type="number" data-value="5">5</button>
        <button class="hotspot n6" data-type="number" data-value="6">6</button>
        <button class="hotspot red-bet" data-type="color" data-value="red">Red</button>
        <button class="hotspot black-bet" data-type="color" data-value="black">Black</button>
        <button class="hotspot even-bet" data-type="oddEven" data-value="even">Even</button>
        <button class="hotspot odd-bet" data-type="oddEven" data-value="odd">Odd</button>
        <button class="hotspot low-bet" data-type="range" data-value="low">1-18</button>
        <button class="hotspot high-bet" data-type="range" data-value="high">19-36</button>
        <button class="hotspot dozen1" data-type="dozen" data-value="1">1st 12</button>
        <button class="hotspot dozen2" data-type="dozen" data-value="2">2nd 12</button>
        <button class="hotspot dozen3" data-type="dozen" data-value="3">3rd 12</button>
      </div>

      <div class="chip-row">
        <button class="chip c50" data-chip="50">50</button>
        <button class="chip c100 active" data-chip="100">100</button>
        <button class="chip c250" data-chip="250">250</button>
        <button class="chip c500" data-chip="500">500</button>
        <button class="chip c1000" data-chip="1000">1000</button>
      </div>

      <button id="spinBtn" class="spin-button">SPIN<span>HOLD TO AUTO SPIN</span></button>
      <button id="clearBtn" class="action clear">CLEAR</button>
      <button id="doubleBtn" class="action double">x2</button>
      <button id="rebetBtn" class="action rebet">REBET</button>
    </section>
  </main>

<script>
const redNums = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
let balance = 5000;
let betAmount = 100;
let currentBet = null;
let lastBet = null;
let rotation = 0;

const balanceEl = document.getElementById('balance');
const totalBetEl = document.getElementById('totalBet');
const lastWinEl = document.getElementById('lastWin');
const lastColorEl = document.getElementById('lastColor');
const wheel = document.getElementById('wheel');
const ballOrbit = document.getElementById('ballOrbit');
const spinBtn = document.getElementById('spinBtn');

function money(n){ return '$' + n.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}); }
function updateHud(){ balanceEl.textContent = money(balance); totalBetEl.textContent = money(betAmount); }

function placeBet(type, value){
  currentBet = {type, value: isNaN(value) ? value : Number(value)};
  lastBet = currentBet;
  lastWinEl.textContent = currentBet.value;
  lastColorEl.textContent = 'BET PLACED';
}

function setBet(amount){
  betAmount = Number(amount);
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', Number(c.dataset.chip) === betAmount));
  updateHud();
}

document.querySelectorAll('.hotspot').forEach(btn => btn.addEventListener('click', () => placeBet(btn.dataset.type, btn.dataset.value)));
document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => setBet(btn.dataset.chip)));
document.getElementById('clearBtn').onclick = () => { currentBet = null; lastWinEl.textContent='--'; lastColorEl.textContent='PLACE BET'; };
document.getElementById('doubleBtn').onclick = () => setBet(betAmount * 2);
document.getElementById('rebetBtn').onclick = () => { if(lastBet) currentBet = lastBet; };

function checkWin(num, color){
  if(!currentBet) return false;
  const b = currentBet;
  if(b.type === 'number') return num === b.value;
  if(b.type === 'color') return color === b.value;
  if(b.type === 'oddEven') return num !== 0 && (b.value === 'odd' ? num % 2 === 1 : num % 2 === 0);
  if(b.type === 'range') return num !== 0 && (b.value === 'low' ? num <= 18 : num >= 19);
  if(b.type === 'dozen') return num !== 0 && Math.ceil(num / 12) === Number(b.value);
  return false;
}

function payout(){
  if(currentBet.type === 'number') return 36;
  if(currentBet.type === 'dozen') return 3;
  return 2;
}

spinBtn.onclick = () => {
  if(!currentBet){ lastWinEl.textContent='NO BET'; lastColorEl.textContent='SELECT TABLE'; return; }
  if(balance < betAmount){ lastWinEl.textContent='NO CASH'; lastColorEl.textContent='LOW BALANCE'; return; }

  balance -= betAmount;
  updateHud();
  spinBtn.disabled = true;

  const win = Math.floor(Math.random() * 37);
  const color = win === 0 ? 'green' : redNums.includes(win) ? 'red' : 'black';
  const pocketAngle = win * (360 / 37);
  rotation += 2520 + pocketAngle;

  wheel.style.transform = `rotate(${rotation}deg)`;
  ballOrbit.style.transform = `rotate(${-rotation - 720}deg)`;

  setTimeout(() => {
    const won = checkWin(win, color);
    if(won) balance += betAmount * payout();
    updateHud();
    lastWinEl.textContent = win;
    lastColorEl.textContent = color.toUpperCase();
    lastColorEl.className = color;
    spinBtn.disabled = false;
  }, 3300);
};

updateHud();
</script>
</body>
</html>
