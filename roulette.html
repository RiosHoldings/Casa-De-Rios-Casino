<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Roulette | Casino Casa de Ríos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Saira+Condensed:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles-casa.css">

  <style>
    .roulette-wrap {
      position: relative;
      z-index: 1;
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 12px 10px 36px;
    }

    .roulette-header {
      border: 1px solid var(--casa-line);
      background:
        linear-gradient(180deg, rgba(0,0,0,.76), rgba(12,7,17,.88)),
        radial-gradient(circle at 50% 0%, rgba(122,35,174,.34), transparent 62%);
      box-shadow: var(--casa-shadow);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .roulette-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .roulette-brand img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(212,166,74,.48));
    }

    .roulette-brand h1 {
      margin: 0;
      font-family: var(--font-title);
      color: var(--casa-gold-2);
      text-transform: uppercase;
      letter-spacing: .11em;
      font-size: clamp(26px, 4vw, 46px);
      line-height: .95;
    }

    .roulette-brand span {
      display: block;
      margin-top: 5px;
      color: var(--casa-muted);
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 11px;
    }

    .roulette-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .roulette-layout {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr) 300px;
      gap: 14px;
      align-items: start;
    }

    .roulette-panel,
    .roulette-table {
      border: 1px solid var(--casa-line);
      background:
        linear-gradient(180deg, rgba(12,7,17,.90), rgba(5,3,8,.96)),
        radial-gradient(circle at 50% 0%, rgba(122,35,174,.12), transparent 60%);
      box-shadow: var(--casa-shadow);
      padding: 14px;
    }

    .roulette-panel-title {
      font-family: var(--font-title);
      color: var(--casa-gold-2);
      text-transform: uppercase;
      letter-spacing: .13em;
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wheel-stage {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(241,208,106,.42);
      background:
        radial-gradient(circle at 50% 15%, rgba(241,208,106,.13), transparent 20%),
        radial-gradient(circle at 50% 45%, rgba(122,35,174,.30), transparent 46%),
        linear-gradient(180deg, rgba(0,0,0,.86), rgba(5,3,8,.98));
      padding: 18px;
      isolation: isolate;
    }

    .wheel-stage::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(241,208,106,.20);
      pointer-events: none;
      box-shadow: inset 0 0 50px rgba(212,166,74,.08);
      z-index: -1;
    }

    .roulette-title-box {
      text-align: center;
      border: 1px solid rgba(212,166,74,.24);
      background:
        linear-gradient(180deg, rgba(72,25,101,.50), rgba(0,0,0,.58));
      padding: 16px 10px 12px;
      margin-bottom: 16px;
    }

    .roulette-title-box h2 {
      margin: 0;
      color: var(--casa-gold-2);
      font-family: var(--font-title);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: clamp(34px, 7vw, 70px);
      line-height: .9;
      text-shadow:
        0 0 12px rgba(241,208,106,.38),
        0 0 28px rgba(122,35,174,.5),
        0 10px 28px rgba(0,0,0,.95);
    }

    .roulette-title-box span {
      display: block;
      margin-top: 10px;
      color: var(--casa-muted);
      text-transform: uppercase;
      letter-spacing: .22em;
      font-size: 12px;
    }

    .wheel-area {
      display: grid;
      place-items: center;
      padding: 14px 0 18px;
    }

    .wheel {
      width: min(430px, 82vw);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 8px solid rgba(241,208,106,.72);
      background:
        radial-gradient(circle at 50% 50%, #08050d 0 18%, transparent 19%),
        conic-gradient(
          #7c101d 0deg 10deg,
          #050505 10deg 20deg,
          #7c101d 20deg 30deg,
          #050505 30deg 40deg,
          #7c101d 40deg 50deg,
          #050505 50deg 60deg,
          #7c101d 60deg 70deg,
          #050505 70deg 80deg,
          #7c101d 80deg 90deg,
          #050505 90deg 100deg,
          #7c101d 100deg 110deg,
          #050505 110deg 120deg,
          #7c101d 120deg 130deg,
          #050505 130deg 140deg,
          #7c101d 140deg 150deg,
          #050505 150deg 160deg,
          #7c101d 160deg 170deg,
          #050505 170deg 180deg,
          #7c101d 180deg 190deg,
          #050505 190deg 200deg,
          #7c101d 200deg 210deg,
          #050505 210deg 220deg,
          #7c101d 220deg 230deg,
          #050505 230deg 240deg,
          #7c101d 240deg 250deg,
          #050505 250deg 260deg,
          #7c101d 260deg 270deg,
          #050505 270deg 280deg,
          #7c101d 280deg 290deg,
          #050505 290deg 300deg,
          #7c101d 300deg 310deg,
          #050505 310deg 320deg,
          #7c101d 320deg 330deg,
          #050505 330deg 340deg,
          #0b6b34 340deg 360deg
        );
      box-shadow:
        inset 0 0 34px rgba(0,0,0,.9),
        0 0 34px rgba(212,166,74,.16),
        0 24px 70px rgba(0,0,0,.65);
      display: grid;
      place-items: center;
      transition: transform 1.1s cubic-bezier(.16,.9,.26,1.02);
      position: relative;
    }

    .wheel::before {
      content: "";
      position: absolute;
      width: 68%;
      height: 68%;
      border-radius: 50%;
      border: 1px solid rgba(241,208,106,.22);
      box-shadow: inset 0 0 32px rgba(0,0,0,.75);
      pointer-events: none;
    }

    .wheel-center {
      position: relative;
      z-index: 2;
      width: 38%;
      height: 38%;
      border-radius: 50%;
      border: 3px solid rgba(241,208,106,.72);
      background:
        radial-gradient(circle, rgba(72,25,101,.95), rgba(0,0,0,.94));
      display: grid;
      place-items: center;
      text-align: center;
      box-shadow:
        inset 0 0 20px rgba(0,0,0,.88),
        0 0 18px rgba(212,166,74,.22);
    }

    .wheel-number {
      color: var(--casa-gold-2);
      font-family: var(--font-title);
      font-size: clamp(38px, 7vw, 70px);
      line-height: 1;
      text-shadow: 0 0 16px rgba(241,208,106,.42);
    }

    .wheel-color {
      color: var(--casa-muted);
      text-transform: uppercase;
      letter-spacing: .15em;
      font-size: 11px;
      margin-top: 4px;
    }

    .result-box {
      border: 1px solid rgba(212,166,74,.24);
      background: rgba(0,0,0,.58);
      padding: 12px;
      text-align: center;
    }

    .result-box strong {
      display: block;
      font-family: var(--font-title);
      color: var(--casa-gold-2);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 18px;
      margin-bottom: 5px;
    }

    .result-box span {
      color: var(--casa-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .bet-grid {
      display: grid;
      gap: 9px;
    }

    .bet-choice {
      border: 1px solid rgba(212,166,74,.26);
      background: rgba(0,0,0,.40);
      color: var(--casa-bone);
      border-radius: 9px;
      padding: 11px;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: .10em;
      font-family: var(--font-ui);
      font-weight: 900;
    }

    .bet-choice.active {
      border-color: rgba(241,208,106,.72);
      background:
        linear-gradient(90deg, rgba(72,25,101,.90), rgba(0,0,0,.48));
      color: var(--casa-gold-2);
      box-shadow: inset 3px 0 0 rgba(212,166,74,.82);
    }

    .split-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .number-box {
      display: none;
      margin-top: 10px;
    }

    .number-box.show {
      display: block;
    }

    .spin-controls {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .spin-button {
      width: 100%;
      min-height: 58px;
      border: 1px solid rgba(241,208,106,.70);
      background:
        linear-gradient(180deg, #f1d06a, #b48223 48%, #6d4210);
      color: #140816;
      border-radius: 12px;
      font-family: var(--font-title);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 23px;
      font-weight: 900;
      box-shadow:
        0 0 22px rgba(212,166,74,.28),
        0 12px 30px rgba(0,0,0,.55);
    }

    .spin-button:disabled {
      opacity: .62;
      cursor: not-allowed;
    }

    .wallet-row,
    .recent-row {
      border-top: 1px solid rgba(212,166,74,.13);
      padding: 10px 0;
      line-height: 1.45;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .wallet-row:first-of-type,
    .recent-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .wallet-row span:first-child {
      color: var(--casa-muted);
    }

    .wallet-row b {
      color: var(--casa-gold-2);
      font-weight: 400;
      text-align: right;
    }

    .recent-list {
      display: grid;
      gap: 8px;
    }

    .recent-row {
      display: block;
      background: rgba(0,0,0,.26);
      border: 1px solid rgba(212,166,74,.12);
      padding: 10px;
    }

    .recent-title {
      color: var(--casa-gold-2);
      font-size: 16px;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }

    .recent-meta {
      color: var(--casa-muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .good {
      color: var(--casa-good) !important;
    }

    .bad {
      color: var(--casa-bad) !important;
    }

    @media (max-width: 1100px) {
      .roulette-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .roulette-wrap {
        padding: 0 0 28px;
      }

      .roulette-header {
        border-left: 0;
        border-right: 0;
        grid-template-columns: 1fr;
        margin-bottom: 10px;
      }

      .roulette-brand {
        justify-content: center;
        text-align: center;
      }

      .roulette-brand img {
        width: 54px;
        height: 54px;
      }

      .roulette-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .roulette-panel,
      .roulette-table {
        border-left: 0;
        border-right: 0;
      }

      .wheel-stage {
        padding: 10px;
      }

      .roulette-title-box h2 {
        font-size: clamp(42px, 14vw, 70px);
      }

      .split-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="roulette-wrap">
    <header class="roulette-header">
      <div class="roulette-brand">
        <img src="./images/casa-rios-logo.webp" alt="Casa de Ríos Logo" />
        <div>
          <h1>Roulette</h1>
          <span>Spin the wheel. Respect the house.</span>
        </div>
      </div>

      <div class="roulette-actions">
        <a class="casa-btn" href="./index.html">Lobby</a>
        <button class="casa-btn" id="refreshWalletBtn">Refresh</button>
      </div>
    </header>

    <main class="roulette-layout">
      <aside class="roulette-panel">
        <div class="roulette-panel-title">♛ Place Your Bet</div>

        <div class="bet-grid">
          <div class="split-buttons">
            <button class="bet-choice active" data-type="color" data-value="red">Red</button>
            <button class="bet-choice" data-type="color" data-value="black">Black</button>
          </div>

          <div class="split-buttons">
            <button class="bet-choice" data-type="parity" data-value="even">Even</button>
            <button class="bet-choice" data-type="parity" data-value="odd">Odd</button>
          </div>

          <div class="split-buttons">
            <button class="bet-choice" data-type="range" data-value="low">1-18</button>
            <button class="bet-choice" data-type="range" data-value="high">19-36</button>
          </div>

          <button class="bet-choice" data-type="number" data-value="number">Exact Number</button>

          <div class="number-box" id="numberBox">
            <label for="numberBet">Number 0-36</label>
            <input id="numberBet" type="number" min="0" max="36" value="7" />
          </div>
        </div>

        <div class="spin-controls">
          <div>
            <label for="betAmount">Bet Amount</label>
            <input id="betAmount" type="number" min="100" max="50000" step="100" value="1000" />
          </div>

          <button class="spin-button" id="spinBtn">Spin</button>
        </div>
      </aside>

      <section class="roulette-table">
        <div class="wheel-stage">
          <div class="roulette-title-box">
            <h2>Casa Wheel</h2>
            <span>Luck. Honor. Loyalty.</span>
          </div>

          <div class="wheel-area">
            <div class="wheel" id="wheel">
              <div class="wheel-center">
                <div>
                  <div class="wheel-number" id="resultNumber">--</div>
                  <div class="wheel-color" id="resultColor">Ready</div>
                </div>
              </div>
            </div>
          </div>

          <div class="result-box">
            <strong id="resultTitle">Ready to Spin</strong>
            <span id="resultText">Choose your bet and let the wheel decide.</span>
          </div>
        </div>
      </section>

      <aside class="roulette-panel">
        <div class="roulette-panel-title">🪙 Wallet</div>

        <div class="wallet-row">
          <span>Balance</span>
          <b><span id="walletBalance">0</span> chips</b>
        </div>

        <div class="wallet-row">
          <span>Status</span>
          <b id="playerStatus">Loading</b>
        </div>

        <div class="wallet-row">
          <span>VIP Tier</span>
          <b id="vipTier">None</b>
        </div>

        <div class="wallet-row">
          <span>Player ID</span>
          <b id="playerId">---</b>
        </div>

        <div class="wallet-row">
          <span>Last Payout</span>
          <b id="lastPayout">0</b>
        </div>

        <div class="wallet-row">
          <span>Net Change</span>
          <b id="netChange">0</b>
        </div>

        <div class="roulette-panel-title" style="margin-top: 18px;">◉ Recent Spins</div>

        <div class="recent-list" id="recentList">
          <div class="recent-row">
            <div class="recent-title">---</div>
            <div class="recent-meta">No spins yet.</div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const PLAYER_KEY = "casa_rios_player_id";
    const PLAYER_SECRET_KEY = "casa_rios_player_secret";
    const RECENT_KEY = "casa_rios_roulette_recent";

    let selectedBet = {
      type: "color",
      value: "red",
      label: "Red"
    };

    let wheelRotation = 0;

    function makeId() {
      if (crypto.randomUUID) {
        return "CDR-" + crypto.randomUUID().slice(0, 8).toUpperCase();
      }

      return "CDR-" + Date.now().toString(36).toUpperCase();
    }

    function makeSecret() {
      if (crypto.randomUUID) {
        return crypto.randomUUID() + "-" + crypto.randomUUID();
      }

      return String(Date.now()) + "-" + Math.random().toString(16).slice(2);
    }

    function getPlayerId() {
      let id = localStorage.getItem(PLAYER_KEY);

      if (!id) {
        id = makeId();
        localStorage.setItem(PLAYER_KEY, id);
      }

      return id;
    }

    function getPlayerSecret() {
      let secret = localStorage.getItem(PLAYER_SECRET_KEY);

      if (!secret) {
        secret = makeSecret();
        localStorage.setItem(PLAYER_SECRET_KEY, secret);
      }

      return secret;
    }

    function money(n) {
      return Number(n || 0).toLocaleString();
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function shortId(id) {
      if (!id) return "---";
      if (id.length <= 14) return id;
      return id.slice(0, 12) + "...";
    }

    function setResult(title, text, good = false) {
      const titleEl = document.getElementById("resultTitle");
      const textEl = document.getElementById("resultText");

      titleEl.textContent = title;
      textEl.textContent = text;

      titleEl.classList.remove("good", "bad");
      titleEl.classList.add(good ? "good" : "bad");
    }

    async function loadWallet() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      setText("playerId", shortId(playerId));

      try {
        const response = await fetch(
          "/api/wallet?playerId=" +
          encodeURIComponent(playerId) +
          "&playerSecret=" +
          encodeURIComponent(playerSecret)
        );

        const data = await response.json();

        if (!data.ok) {
          setText("walletBalance", "0");
          setText("playerStatus", "Not Saved");
          setText("vipTier", "None");
          setResult("Profile Needed", "Go to the lobby and save your player profile first.", false);
          return;
        }

        const p = data.player || {};

        setText("walletBalance", money(p.chips || 0));
        setText("playerStatus", String(p.status || "active").toUpperCase());
        setText("vipTier", String(p.vip_tier || "none").toUpperCase());
      } catch (error) {
        setResult("Wallet Error", "Could not load wallet. Check the deployment.", false);
      }
    }

    async function spinRoulette() {
      const spinBtn = document.getElementById("spinBtn");
      const betAmount = Math.floor(Number(document.getElementById("betAmount").value || 0));

      let betType = selectedBet.type;
      let betValue = selectedBet.value;

      if (betType === "number") {
        betValue = String(Math.floor(Number(document.getElementById("numberBet").value || 0)));

        if (Number(betValue) < 0 || Number(betValue) > 36) {
          setResult("Invalid Number", "Exact number must be between 0 and 36.", false);
          return;
        }
      }

      if (!Number.isFinite(betAmount) || betAmount < 100) {
        setResult("Invalid Bet", "Minimum bet is 100 chips.", false);
        return;
      }

      if (betAmount > 50000) {
        setResult("Invalid Bet", "Maximum bet is 50,000 chips.", false);
        return;
      }

      spinBtn.disabled = true;
      spinBtn.textContent = "Spinning...";
      setResult("Spinning", "The wheel is turning. The house is watching.", true);

      const wheel = document.getElementById("wheel");
      wheelRotation += 1080 + Math.floor(Math.random() * 720);
      wheel.style.transform = `rotate(${wheelRotation}deg)`;

      const startedAt = Date.now();

      try {
        const response = await fetch("/api/roulette", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            playerId: getPlayerId(),
            playerSecret: getPlayerSecret(),
            betAmount,
            betType,
            betValue,
            type: betType,
            value: betValue,
            amount: betAmount
          })
        });

        const data = await response.json();

        const elapsed = Date.now() - startedAt;
        const waitMore = Math.max(0, 1000 - elapsed);
        await new Promise(resolve => setTimeout(resolve, waitMore));

        if (!data.ok) {
          setResult("Spin Denied", data.error || "The house denied this spin.", false);
          return;
        }

        const number =
          data.resultNumber ??
          data.result_number ??
          data.number ??
          data.result?.number ??
          "--";

        const color =
          data.resultColor ??
          data.result_color ??
          data.color ??
          data.result?.color ??
          "";

        const payout = Number(data.payout || 0);
        const balanceAfter =
          data.balanceAfter ??
          data.balance_after ??
          data.player?.chips ??
          null;

        const netChange =
          data.netChange ??
          data.net_change ??
          payout - betAmount;

        setText("resultNumber", number);
        setText("resultColor", String(color || "").toUpperCase());
        setText("lastPayout", money(payout));
        setText("netChange", (netChange >= 0 ? "+" : "") + money(netChange));

        if (balanceAfter !== null) {
          setText("walletBalance", money(balanceAfter));
        } else {
          loadWallet();
        }

        if (payout > 0) {
          setResult("Winner", `Landed on ${number} ${color}. Payout: ${money(payout)} chips.`, true);
        } else {
          setResult("House Wins", `Landed on ${number} ${color}. No payout this spin.`, false);
        }

        saveRecentSpin({
          number,
          color,
          betType,
          betValue,
          betAmount,
          payout,
          netChange
        });

        renderRecentSpins();
      } catch (error) {
        setResult("Spin Failed", "Roulette request failed. Check the API deployment.", false);
      } finally {
        spinBtn.disabled = false;
        spinBtn.textContent = "Spin";
      }
    }

    function saveRecentSpin(data) {
      const current = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");

      current.unshift({
        time: new Date().toLocaleTimeString(),
        ...data
      });

      localStorage.setItem(RECENT_KEY, JSON.stringify(current.slice(0, 8)));
    }

    function renderRecentSpins() {
      const list = document.getElementById("recentList");
      const spins = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");

      if (!spins.length) {
        list.innerHTML = `
          <div class="recent-row">
            <div class="recent-title">---</div>
            <div class="recent-meta">No spins yet.</div>
          </div>
        `;
        return;
      }

      list.innerHTML = spins.map(spin => `
        <div class="recent-row">
          <div class="recent-title">${spin.number} ${String(spin.color || "").toUpperCase()}</div>
          <div class="recent-meta">
            Bet: ${spin.betType} ${spin.betValue}<br>
            Amount: ${money(spin.betAmount)} | Payout: ${money(spin.payout)} | Net: ${(spin.netChange >= 0 ? "+" : "") + money(spin.netChange)}
          </div>
        </div>
      `).join("");
    }

    document.addEventListener("DOMContentLoaded", () => {
      getPlayerId();
      getPlayerSecret();

      loadWallet();
      renderRecentSpins();

      document.getElementById("refreshWalletBtn").addEventListener("click", loadWallet);
      document.getElementById("spinBtn").addEventListener("click", spinRoulette);

      document.querySelectorAll(".bet-choice").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".bet-choice").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          selectedBet = {
            type: btn.dataset.type,
            value: btn.dataset.value,
            label: btn.textContent.trim()
          };

          document.getElementById("numberBox").classList.toggle("show", selectedBet.type === "number");
        });
      });
    });
  </script>
</body>
</html>
