<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Casino Casa de Ríos</title>

  <link rel="stylesheet" href="./styles-casa.css">
</head>

<body>
  <main class="lobby-shell">
    <img class="lobby-art" src="./images/lobby-ui.jpeg" alt="Casino Casa de Ríos Lobby">

    <div id="walletBalance" class="lobby-live lobby-wallet">0</div>
    <div id="vipTier" class="lobby-live lobby-vip">None</div>
    <div id="playerStatus" class="lobby-live lobby-status">Loading</div>

    <a class="lobby-hotspot hs-blackjack" href="./blackjack.html" aria-label="Blackjack"></a>
    <a class="lobby-hotspot hs-roulette" href="./roulette.html" aria-label="Roulette"></a>
    <a class="lobby-hotspot hs-slots" href="/slots/slots.html" aria-label="Slots"></a>
    <a class="lobby-hotspot hs-texas" href="#" aria-label="Texas Hold'em"></a>

    <a class="lobby-hotspot hs-cashout" href="./cashout.html" aria-label="Cash Out"></a>
    <a class="lobby-hotspot hs-ledger" href="./history.html" aria-label="View Ledger"></a>
    <a class="lobby-hotspot hs-vip" href="#" aria-label="VIP Loyalty"></a>
    <a class="lobby-hotspot hs-rules" href="./rules.html" aria-label="House Rules"></a>

    <button class="profile-open-btn" id="openProfileBtn" type="button">Profile</button>

    <section class="profile-panel" id="profilePanel">
      <button class="profile-close-btn" id="closeProfileBtn" type="button">×</button>

      <h2>Player Profile</h2>

      <label>
        Character Name
        <input id="characterName" placeholder="Example: Diego Ríos">
      </label>

      <label>
        Discord Name
        <input id="discordName" placeholder="Example: diego_rios">
      </label>

      <button id="createPlayerBtn" type="button">Save Profile</button>
      <button id="refreshWalletBtn" type="button">Refresh Wallet</button>

      <div id="profileMsg">Create or update your player profile.</div>

      <div class="profile-info">
        <p>Player ID: <span id="playerId">---</span></p>
        <p>Wallet: <span id="walletBalanceSide">0</span> chips</p>
        <p>VIP: <span id="vipTierSide">None</span></p>
        <p>Lock: <span id="lockedStatus">Unknown</span></p>
        <p>Character: <span id="profileCharacter">---</span></p>
        <p>Discord: <span id="profileDiscord">---</span></p>
      </div>
    </section>
  </main>

  <script>
    const PLAYER_KEY = "casa_rios_player_id";
    const PLAYER_SECRET_KEY = "casa_rios_player_secret";

    function makeId() {
      if (crypto.randomUUID) {
        return "CDR-" + crypto.randomUUID().slice(0, 8).toUpperCase();
      }

      return "CDR-" + Date.now().toString(36).toUpperCase();
    }

    function makeSecret() {
      if (crypto.randomUUID) {
        return crypto.randomUUID() + "-" + crypto.randomUUID();
      }

      return String(Date.now()) + "-" + Math.random().toString(16).slice(2);
    }

    function money(n) {
      return Number(n || 0).toLocaleString();
    }

    function getPlayerId() {
      let id = localStorage.getItem(PLAYER_KEY);

      if (!id) {
        id = makeId();
        localStorage.setItem(PLAYER_KEY, id);
      }

      return id;
    }

    function getPlayerSecret() {
      let secret = localStorage.getItem(PLAYER_SECRET_KEY);

      if (!secret) {
        secret = makeSecret();
        localStorage.setItem(PLAYER_SECRET_KEY, secret);
      }

      return secret;
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function shortId(id) {
      if (!id) return "---";
      if (id.length <= 14) return id;
      return id.slice(0, 12) + "...";
    }

    function setProfileMessage(text) {
      setText("profileMsg", text);
    }

    function setEmptyState() {
      const playerId = getPlayerId();

      setText("playerId", shortId(playerId));
      setText("walletBalance", "0");
      setText("walletBalanceSide", "0");
      setText("playerStatus", "Not Saved");
      setText("vipTier", "None");
      setText("vipTierSide", "None");
      setText("lockedStatus", "Unknown");
    }

    async function loadWallet() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      setText("playerId", shortId(playerId));

      try {
        const response = await fetch(
          "/api/wallet?playerId=" +
          encodeURIComponent(playerId) +
          "&playerSecret=" +
          encodeURIComponent(playerSecret)
        );

        const data = await response.json();

        if (!data.ok) {
          setEmptyState();
          setProfileMessage(data.error || "Wallet not loaded. Save your player profile first.");
          return;
        }

        const p = data.player || {};

        setText("walletBalance", money(p.chips || 0));
        setText("walletBalanceSide", money(p.chips || 0));
        setText("playerStatus", String(p.status || "active").toUpperCase());
        setText("vipTier", String(p.vip_tier || "none").toUpperCase());
        setText("vipTierSide", String(p.vip_tier || "none").toUpperCase());
        setText("lockedStatus", Number(p.locked || 0) === 1 ? "LOCKED" : "UNLOCKED");

        setText("profileCharacter", p.character_name || "---");
        setText("profileDiscord", p.discord_name || "---");

        const characterInput = document.getElementById("characterName");
        const discordInput = document.getElementById("discordName");

        if (characterInput && p.character_name) characterInput.value = p.character_name;
        if (discordInput && p.discord_name) discordInput.value = p.discord_name;

        setProfileMessage("Profile loaded.");
      } catch (error) {
        setEmptyState();
        setProfileMessage("Wallet request failed. Check deployment.");
      }
    }

    async function savePlayer() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      const characterName = document.getElementById("characterName").value.trim();
      const discordName = document.getElementById("discordName").value.trim();

      if (!characterName || !discordName) {
        setProfileMessage("Enter character name and Discord name first.");
        return;
      }

      setProfileMessage("Saving player profile...");

      try {
        const response = await fetch("/api/player", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            playerId,
            playerSecret,
            characterName,
            discordName,
            character: characterName,
            discord: discordName
          })
        });

        const data = await response.json();

        if (!data.ok) {
          setProfileMessage("Failed: " + data.error);
          return;
        }

        setProfileMessage("Player profile saved.");
        await loadWallet();
      } catch (error) {
        setProfileMessage("Save failed. Check deployment.");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      getPlayerId();
      getPlayerSecret();

      setEmptyState();
      loadWallet();

      document.getElementById("createPlayerBtn")?.addEventListener("click", savePlayer);
      document.getElementById("refreshWalletBtn")?.addEventListener("click", loadWallet);

      document.getElementById("openProfileBtn")?.addEventListener("click", () => {
        document.getElementById("profilePanel").classList.add("open");
      });

      document.getElementById("closeProfileBtn")?.addEventListener("click", () => {
        document.getElementById("profilePanel").classList.remove("open");
      });
    });
  </script>
</body>
</html>
