<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cash Out | Casino Casa de Ríos</title>

  <link rel="stylesheet" href="./cashout.css" />
</head>

<body>
  <main class="cashout-shell">

    <div id="walletBalance" class="cashout-live cashout-balance">
      Loading...
    </div>

    <div id="walletStatus" class="cashout-live cashout-wallet-status">
      ---
    </div>

    <div id="playerStatus" class="cashout-live cashout-player-status">
      ---
    </div>

    <div id="vipTier" class="cashout-live cashout-vip">
      ---
    </div>

    <input
      id="cashoutNote"
      class="cashout-note"
      type="text"
      value="Cash-out requested by player"
    />

    <button
      id="cashoutBtn"
      class="cashout-hotspot cashout-request-btn"
      type="button"
    >
      Create Cash-Out Ticket
    </button>

    <a class="cashout-hotspot cashout-back" href="./index.html">
      Lobby
    </a>

    <a class="cashout-hotspot cashout-buy" href="./buyin.html">
      Buy Chips
    </a>

    <div id="cashoutResult" class="cashout-result">
      Waiting for cash-out request.
    </div>

  </main>

  <script>
    const PLAYER_KEY = "casa_rios_player_id";
    const PLAYER_SECRET_KEY = "casa_rios_player_secret";

    function money(n) {
      return Number(n || 0).toLocaleString();
    }

    function setText(id, value) {
      const el = document.getElementById(id);

      if (el) {
        el.textContent = value;
      }
    }

    async function loadCashoutPage() {
      const playerId = localStorage.getItem(PLAYER_KEY);
      const playerSecret = localStorage.getItem(PLAYER_SECRET_KEY);

      if (!playerId || !playerSecret) {
        setText(
          "cashoutResult",
          "Create your player profile from the lobby first."
        );

        return;
      }

      try {
        const response = await fetch(
          "/api/wallet?playerId=" +
            encodeURIComponent(playerId) +
            "&playerSecret=" +
            encodeURIComponent(playerSecret)
        );

        const data = await response.json();

        if (!data.ok) {
          setText(
            "cashoutResult",
            data.error || "Wallet failed to load."
          );

          return;
        }

        const player = data.player || {};

        const locked = Number(player.locked || 0) === 1;

        setText(
          "walletBalance",
          money(player.chips || 0)
        );

        setText(
          "walletStatus",
          locked ? "LOCKED" : "UNLOCKED"
        );

        setText(
          "playerStatus",
          String(player.status || "active").toUpperCase()
        );

        setText(
          "vipTier",
          String(player.vip_tier || "patron")
            .replaceAll("_", " ")
            .toUpperCase()
        );

        if (
          player.status === "cashout_pending" ||
          locked
        ) {
          document.getElementById("cashoutBtn").style.display =
            "none";

          setText(
            "cashoutResult",
            "Cash-out request pending review. Your wallet is locked."
          );
        }
      } catch (error) {
        setText(
          "cashoutResult",
          "Wallet request failed."
        );
      }
    }

    async function requestCashout() {
      const resultBox =
        document.getElementById("cashoutResult");

      const playerId =
        localStorage.getItem(PLAYER_KEY);

      const playerSecret =
        localStorage.getItem(PLAYER_SECRET_KEY);

      const note =
        document.getElementById("cashoutNote")
          .value
          .trim();

      resultBox.textContent =
        "Creating payout ticket...";

      try {
        const response = await fetch(
          "/api/cashout",
          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              playerId,
              playerSecret,
              note
            })
          }
        );

        const data =
          await response.json();

        if (!data.ok) {
          resultBox.textContent =
            "Failed: " + data.error;

          return;
        }

        resultBox.innerHTML =
          "<strong>Payout ticket created.</strong><br>" +
          "Amount: " +
          money(data.amount) +
          " chips<br>" +
          "Status: Pending<br>" +
          "Wallet Locked: Yes";

        document.getElementById(
          "cashoutBtn"
        ).style.display = "none";

        await loadCashoutPage();
      } catch (error) {
        resultBox.textContent =
          "Cash-out request failed.";
      }
    }

    document.addEventListener(
      "DOMContentLoaded",
      () => {
        loadCashoutPage();

        document
          .getElementById("cashoutBtn")
          .addEventListener(
            "click",
            requestCashout
          );
      }
    );
  </script>
</body>
</html>
