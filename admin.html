<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa de Ríos Admin</title>
  <link rel="stylesheet" href="./styles.css?v=9" />
</head>
<body>
  <main class="casino-shell">
    <section class="hero compact">
      <div class="crest">R</div>
      <div class="eyebrow">CASA DE RÍOS</div>
      <h1>House Admin</h1>
      <p class="motto">Suerte. Honor. Lealtad.</p>
      <p class="subtext">Buy-ins, wallet controls, and payout tickets.</p>
    </section>

    <section class="game-panel">
      <h2>Admin Access</h2>

      <label>
        Admin Key
        <input id="adminKey" type="password" placeholder="Enter admin key" />
      </label>

      <label>
        Admin Name
        <input id="adminName" type="text" value="Casa de Ríos Admin" />
      </label>
    </section>

<section class="game-panel">
  <h2>Player Search</h2>

  <label>
    Player ID
    <input id="searchPlayerId" type="text" placeholder="CDR-..." />
  </label>

  <button id="searchPlayerBtn" class="primary">Search Player</button>

  <div id="searchResult" class="result-box">
    No player loaded.
  </div>
</section>

    <section class="game-panel">
      <h2>Add Chips / Buy-In</h2>

      <label>
        Player ID
        <input id="addPlayerId" type="text" placeholder="CDR-..." />
      </label>

      <label>
        Chips to Add
        <input id="addAmount" type="number" min="1" value="10000" />
      </label>

      <label>
        Note
        <input id="addNote" type="text" value="Buy-in approved by house" />
      </label>

      <button id="addChipsBtn" class="primary">Add Chips</button>

      <div id="addResult" class="result-box">
        Waiting for admin action.
      </div>
    </section>

    <section class="game-panel">
      <h2>Payout Tickets</h2>

      <button id="loadPayoutsBtn" class="primary">Load Payout Tickets</button>

      <div id="payoutResult" class="result-box">
        No payout tickets loaded.
      </div>
    </section>

    <a class="back-link" href="./index.html">← Back to Lobby</a>
  </main>

  <script>
    function getAdminKey() {
      return document.getElementById("adminKey").value.trim();
    }

    function getAdminName() {
      return document.getElementById("adminName").value.trim() || "Casa de Ríos Admin";
    }

function transactionLabel(type) {
  if (type === "admin_add_chips") return "Buy-In / Chips Added";
  if (type === "roulette_spin") return "Roulette Spin";
  if (type === "cashout_request") return "Cash-Out Requested";
  if (type === "cashout_paid") return "Cash-Out Paid";
  if (type === "cashout_denied") return "Cash-Out Denied";
  return type || "Unknown Transaction";
}

async function searchPlayer() {
  const resultBox = document.getElementById("searchResult");

  const adminKey = getAdminKey();
  const playerId = document.getElementById("searchPlayerId").value.trim();

  if (!adminKey) {
    resultBox.textContent = "Enter admin key first.";
    return;
  }

  if (!playerId) {
    resultBox.textContent = "Enter a Player ID.";
    return;
  }

  resultBox.textContent = "Searching player...";

  try {
    const response = await fetch(
      "/api/admin-player?playerId=" + encodeURIComponent(playerId),
      {
        method: "GET",
        headers: {
          "x-admin-key": adminKey
        }
      }
    );

    const data = await response.json();

    if (!data.ok) {
      resultBox.textContent = "Failed: " + data.error;
      return;
    }

    const p = data.player;
    const chips = Number(p.chips || 0).toLocaleString();
    const locked = Number(p.locked || 0) === 1 ? "Yes" : "No";

    const transactionsHtml = data.transactions.length
      ? data.transactions.map(tx => {
          const amount = Number(tx.amount || 0);
          const amountText = amount > 0
            ? "+" + amount.toLocaleString()
            : amount.toLocaleString();

          return `
            <div class="ticket-card">
              <strong>${transactionLabel(tx.type)}</strong><br>
              Game: ${tx.game || "N/A"}<br>
              Amount: ${amountText} chips<br>
              Balance After: ${Number(tx.balance_after || 0).toLocaleString()} chips<br>
              Note: ${tx.note || ""}<br>
              Date: ${tx.created_at}
            </div>
          `;
        }).join("<hr>")
      : "No transactions found.";

    const ticketsHtml = data.tickets.length
      ? data.tickets.map(ticket => {
          return `
            <div class="ticket-card">
              <strong>${ticket.status.toUpperCase()} — ${Number(ticket.amount || 0).toLocaleString()} chips</strong><br>
              Ticket ID: ${ticket.id}<br>
              Note: ${ticket.note || ""}<br>
              Created: ${ticket.created_at}<br>
              Fulfilled: ${ticket.fulfilled_at || "Not fulfilled"}<br>
              Fulfilled By: ${ticket.fulfilled_by || "None"}
            </div>
          `;
        }).join("<hr>")
      : "No payout tickets found.";

    resultBox.innerHTML = `
      <div class="ticket-card">
        <strong>${p.character_name || "Unknown Character"}</strong><br>
        Player ID: ${p.id}<br>
        Discord: ${p.discord_name || "Unknown"}<br>
        Status: ${p.status}<br>
        VIP: ${p.vip_tier}<br>
        Balance: ${chips} chips<br>
        Locked: ${locked}<br>
        Created: ${p.created_at}<br>
        Updated: ${p.updated_at}
      </div>

      <hr>

      <strong>Recent Transactions</strong><br><br>
      ${transactionsHtml}

      <hr>

      <strong>Payout Tickets</strong><br><br>
      ${ticketsHtml}
    `;
  } catch (error) {
    resultBox.textContent = "Player search request failed.";
  }
}

    async function addChips() {
      const resultBox = document.getElementById("addResult");

      const adminKey = getAdminKey();
      const playerId = document.getElementById("addPlayerId").value.trim();
      const amount = Number(document.getElementById("addAmount").value);
      const note = document.getElementById("addNote").value.trim();

      if (!adminKey) {
        resultBox.textContent = "Enter admin key first.";
        return;
      }

      if (!playerId || !amount || amount <= 0) {
        resultBox.textContent = "Enter valid Player ID and chip amount.";
        return;
      }

      resultBox.textContent = "Adding chips...";

      try {
        const response = await fetch("/api/admin-add-chips", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": adminKey
          },
          body: JSON.stringify({
            playerId,
            amount,
            note
          })
        });

        const data = await response.json();

        if (!data.ok) {
          resultBox.textContent = "Failed: " + data.error;
          return;
        }

        resultBox.innerHTML =
          "<strong>Chips added.</strong><br>" +
          "Player ID: " + data.playerId + "<br>" +
          "Added: " + data.amountAdded.toLocaleString() + " chips<br>" +
          "Balance After: " + data.balanceAfter.toLocaleString() + " chips";
      } catch (error) {
        resultBox.textContent = "Add chips request failed.";
      }
    }

    async function loadPayouts() {
      const resultBox = document.getElementById("payoutResult");
      const adminKey = getAdminKey();

      if (!adminKey) {
        resultBox.textContent = "Enter admin key first.";
        return;
      }

      resultBox.textContent = "Loading payout tickets...";

      try {
        const response = await fetch("/api/admin-payouts", {
          method: "GET",
          headers: {
            "x-admin-key": adminKey
          }
        });

        const data = await response.json();

        if (!data.ok) {
          resultBox.textContent = "Failed: " + data.error;
          return;
        }

        if (!data.tickets.length) {
          resultBox.textContent = "No payout tickets found.";
          return;
        }

        resultBox.innerHTML = data.tickets.map(ticket => {
          const amount = Number(ticket.amount || 0).toLocaleString();
          const chips = Number(ticket.chips || 0).toLocaleString();
          const locked = Number(ticket.locked || 0) === 1 ? "Yes" : "No";

          return `
            <div class="ticket-card">
              <strong>${ticket.status.toUpperCase()} — ${amount} chips</strong><br>
              Ticket ID: ${ticket.id}<br>
              Player ID: ${ticket.player_id}<br>
              Character: ${ticket.character_name || "Unknown"}<br>
              Discord: ${ticket.discord_name || "Unknown"}<br>
              Wallet Balance: ${chips}<br>
              Wallet Locked: ${locked}<br>
              Note: ${ticket.note || ""}<br>
              Created: ${ticket.created_at}<br>
              Fulfilled: ${ticket.fulfilled_at || "Not fulfilled"}<br>
              Fulfilled By: ${ticket.fulfilled_by || "None"}<br><br>

              ${
                ticket.status === "pending"
                  ? `<button onclick="completePayout('${ticket.id}')">Mark Paid</button>
                     <button onclick="denyPayout('${ticket.id}')">Deny / Unlock</button>`
                  : ""
              }
            </div>
          `;
        }).join("<hr>");
      } catch (error) {
        resultBox.textContent = "Payout list request failed.";
      }
    }

    async function completePayout(ticketId) {
      const resultBox = document.getElementById("payoutResult");
      const adminKey = getAdminKey();
      const fulfilledBy = getAdminName();

      if (!confirm("Mark this payout as PAID? This will set wallet chips to 0 and unlock the wallet.")) {
        return;
      }

      try {
        const response = await fetch("/api/admin-complete-payout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": adminKey
          },
          body: JSON.stringify({
            ticketId,
            fulfilledBy
          })
        });

        const data = await response.json();

        if (!data.ok) {
          alert("Failed: " + data.error);
          return;
        }

        alert("Payout marked paid.");
        loadPayouts();
      } catch (error) {
        resultBox.textContent = "Complete payout request failed.";
      }
    }

    async function denyPayout(ticketId) {
      const resultBox = document.getElementById("payoutResult");
      const adminKey = getAdminKey();
      const deniedBy = getAdminName();

      if (!confirm("Deny this payout and unlock the wallet? Chips will remain in wallet.")) {
        return;
      }

      try {
        const response = await fetch("/api/admin-deny-payout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-key": adminKey
          },
          body: JSON.stringify({
            ticketId,
            deniedBy
          })
        });

        const data = await response.json();

        if (!data.ok) {
          alert("Failed: " + data.error);
          return;
        }

        alert("Payout denied and wallet unlocked.");
        loadPayouts();
      } catch (error) {
        resultBox.textContent = "Deny payout request failed.";
      }
    }

    document.getElementById("searchPlayerBtn").addEventListener("click", searchPlayer);
    document.getElementById("addChipsBtn").addEventListener("click", addChips);
    document.getElementById("loadPayoutsBtn").addEventListener("click", loadPayouts);
  </script>
</body>
</html>
