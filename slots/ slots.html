<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Casa de Ríos Slots</title>
  
  <link rel="stylesheet" href=".slots/ slots.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Georgia, serif;
      background:
        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.70)),
        url("./assets/slots-bg.png") center / cover no-repeat fixed;
      color: gold;
    }

    .slots-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .machine {
      position: relative;
      width: min(96vw, 620px);
      filter: drop-shadow(0 30px 45px rgba(0,0,0,.75));
    }

    .machine-ui {
      width: 100%;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .reels-window {
      position: absolute;
      top: 24.1%;
      left: 13.8%;
      width: 72.5%;
      height: 27.2%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      background: radial-gradient(circle, #2b062a 0%, #080008 75%);
      border-radius: 6px;
    }

    .reel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid rgba(255, 215, 0, .45);
      border-right: 1px solid rgba(255, 215, 0, .45);
      overflow: hidden;
    }

    .reel img {
      width: 78%;
      max-height: 82%;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,215,0,.35));
      transition: transform .15s ease, filter .15s ease;
    }

    .reel.spinning img {
      transform: translateY(8px) scale(1.05);
      filter: blur(1px) drop-shadow(0 0 10px rgba(255,215,0,.5));
    }

    .number-display {
      position: absolute;
      color: #ffd968;
      font-weight: 900;
      font-size: clamp(14px, 3.4vw, 24px);
      text-align: center;
      text-shadow: 0 2px 4px #000, 0 0 8px rgba(255,215,0,.55);
      pointer-events: none;
      line-height: 1;
    }

    #betDisplay {
      top: 58.15%;
      left: 13.2%;
      width: 18%;
    }

    #balanceDisplay {
      top: 58.15%;
      left: 39.6%;
      width: 22%;
    }

    #winDisplay {
      top: 58.15%;
      left: 69.2%;
      width: 18%;
    }

    .hit-btn {
      position: absolute;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .hit-btn:active {
      transform: scale(.96);
    }

    #minusBet {
      top: 65.8%;
      left: 12%;
      width: 20%;
      height: 7.5%;
    }

    #spinBtn {
      top: 64.5%;
      left: 36%;
      width: 28%;
      height: 9.5%;
      border-radius: 999px;
    }

    #plusBet {
      top: 65.8%;
      left: 69%;
      width: 20%;
      height: 7.5%;
    }

    #lobbyBtn {
      position: fixed;
      top: 0;
      left: 0;
      width: 90px;
      height: 70px;
      opacity: 0;
      z-index: 20;
    }

    .status-box {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(92vw, 560px);
      padding: 10px 14px;
      border: 1px solid rgba(255,215,0,.45);
      border-radius: 12px;
      background: rgba(0,0,0,.72);
      text-align: center;
      color: #ffd968;
      font-size: 14px;
      box-shadow: 0 0 18px rgba(0,0,0,.7);
    }

    .good {
      color: #82ff91;
    }

    .bad {
      color: #ff7878;
    }

    @media (max-width: 520px) {
      .slots-page {
        align-items: center;
        padding: 6px;
      }

      .machine {
        width: 100vw;
      }

      .status-box {
        bottom: 6px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <a id="lobbyBtn" href="./index.html" aria-label="Return to Lobby"></a>

  <main class="slots-page">
    <section class="machine">
      <img class="machine-ui" src="./assets/Slots-Ui.png" alt="Casa de Ríos Slot Machine" />

      <div class="reels-window">
        <div class="reel" id="reel1">
          <img src="./slots/assets/ cherries.png" alt="Cherries" />
        </div>

        <div class="reel" id="reel2">
          <img src="./slots/assets/ seven.png" alt="Seven" />
        </div>

        <div class="reel" id="reel3">
          <img src="./slots/assets/ bell.png" alt="Bell" />
        </div>
      </div>

      <div class="number-display" id="betDisplay">1,000</div>
      <div class="number-display" id="balanceDisplay">0</div>
      <div class="number-display" id="winDisplay">0</div>

      <button class="hit-btn" id="minusBet" type="button" aria-label="Decrease Bet"></button>
      <button class="hit-btn" id="spinBtn" type="button" aria-label="Spin"></button>
      <button class="hit-btn" id="plusBet" type="button" aria-label="Increase Bet"></button>
    </section>
  </main>

  <div class="status-box" id="statusBox">Loading wallet...</div>

  <script>
    const PLAYER_KEY = "casa_rios_player_id";
    const PLAYER_SECRET_KEY = "casa_rios_player_secret";

    const SYMBOLS = [
      { name: "logo", img: "./assets/logo.png", multiplier: 25 },
      { name: "crown", img: "./assets/crown.png", multiplier: 50 },
      { name: "seven", img: "./assets/seven.png", multiplier: 15 },
      { name: "coin", img: "./assets/coin.png", multiplier: 10 },
      { name: "bell", img: "./assets/bell.png", multiplier: 8 },
      { name: "whiskey", img: "./assets/whiskey.png", multiplier: 5 },
      { name: "bar", img: "./assets/bar.png", multiplier: 4 },
      { name: "cherries", img: "./assets/cherries.png", multiplier: 3 }
    ];

    const WEIGHTED_SYMBOLS = [
      "cherries", "cherries", "cherries", "cherries", "cherries", "cherries",
      "bar", "bar", "bar", "bar", "bar",
      "whiskey", "whiskey", "whiskey", "whiskey",
      "bell", "bell", "bell",
      "coin", "coin",
      "seven", "seven",
      "logo",
      "crown"
    ];

    let balance = 0;
    let bet = 1000;
    let lastWin = 0;
    let spinning = false;
    let spinTimer = null;

    const betDisplay = document.getElementById("betDisplay");
    const balanceDisplay = document.getElementById("balanceDisplay");
    const winDisplay = document.getElementById("winDisplay");
    const statusBox = document.getElementById("statusBox");

    const reelEls = [
      document.getElementById("reel1"),
      document.getElementById("reel2"),
      document.getElementById("reel3")
    ];

    function money(n) {
      return Number(n || 0).toLocaleString("en-US");
    }

    function setStatus(text, type = "") {
      statusBox.className = "status-box " + type;
      statusBox.textContent = text;
    }

    function makeId() {
      if (crypto.randomUUID) {
        return "CDR-" + crypto.randomUUID().slice(0, 8).toUpperCase();
      }

      return "CDR-" + Date.now().toString(36).toUpperCase();
    }

    function makeSecret() {
      if (crypto.randomUUID) {
        return crypto.randomUUID() + "-" + crypto.randomUUID();
      }

      return String(Date.now()) + "-" + Math.random().toString(16).slice(2);
    }

    function getPlayerId() {
      let id = localStorage.getItem(PLAYER_KEY);

      if (!id) {
        id = makeId();
        localStorage.setItem(PLAYER_KEY, id);
      }

      return id;
    }

    function getPlayerSecret() {
      let secret = localStorage.getItem(PLAYER_SECRET_KEY);

      if (!secret) {
        secret = makeSecret();
        localStorage.setItem(PLAYER_SECRET_KEY, secret);
      }

      return secret;
    }

    function updateDisplay() {
      betDisplay.textContent = money(bet);
      balanceDisplay.textContent = money(balance);
      winDisplay.textContent = money(lastWin);
    }

    function getSymbol(name) {
      return SYMBOLS.find(s => s.name === name) || SYMBOLS[0];
    }

    function randomSymbolName() {
      return WEIGHTED_SYMBOLS[Math.floor(Math.random() * WEIGHTED_SYMBOLS.length)];
    }

    function setReel(index, symbolName) {
      const symbol = getSymbol(symbolName);
      reelEls[index].innerHTML = `<img src="${symbol.img}" alt="${symbol.name}" />`;
    }

    function setReels(names) {
      names.forEach((name, index) => setReel(index, name));
    }

    function startSpinAnimation() {
      reelEls.forEach(reel => reel.classList.add("spinning"));

      spinTimer = setInterval(() => {
        setReels([
          randomSymbolName(),
          randomSymbolName(),
          randomSymbolName()
        ]);
      }, 75);
    }

    function stopSpinAnimation() {
      clearInterval(spinTimer);
      spinTimer = null;
      reelEls.forEach(reel => reel.classList.remove("spinning"));
    }

    function localCalculatePayout(reels, betAmount) {
      const [a, b, c] = reels;

      if (a === b && b === c) {
        return betAmount * getSymbol(a).multiplier;
      }

      if (a === "cherries" && b === "cherries") {
        return betAmount * 2;
      }

      if (a === "cherries") {
        return betAmount;
      }

      return 0;
    }

    async function loadWallet() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      try {
        const response = await fetch(
          "/api/wallet?playerId=" +
          encodeURIComponent(playerId) +
          "&playerSecret=" +
          encodeURIComponent(playerSecret)
        );

        const data = await response.json();

        if (!data.ok) {
          balance = 0;
          updateDisplay();
          setStatus("Profile needed. Go to lobby and save your player first.", "bad");
          return;
        }

        balance = Number(data.player?.chips || 0);
        updateDisplay();
        setStatus("Wallet loaded. Ready to spin.", "good");

      } catch (error) {
        balance = 0;
        updateDisplay();
        setStatus("Wallet connection error.", "bad");
      }
    }

    async function spinSlots() {
      if (spinning) return;

      if (bet < 1000) bet = 1000;
      if (bet > 10000) bet = 10000;

      if (balance < bet) {
        setStatus("Not enough chips for that bet.", "bad");
        return;
      }

      spinning = true;
      lastWin = 0;
      updateDisplay();
      setStatus("Spinning...", "good");
      startSpinAnimation();

      const startedAt = Date.now();

      try {
        const response = await fetch("/api/slots", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            playerId: getPlayerId(),
            playerSecret: getPlayerSecret(),
            betAmount: bet
          })
        });

        const data = await response.json();

        const elapsed = Date.now() - startedAt;
        const waitMore = Math.max(0, 1100 - elapsed);
        await new Promise(resolve => setTimeout(resolve, waitMore));

        stopSpinAnimation();

        if (!data.ok) {
          setStatus(data.error || "Spin denied.", "bad");
          spinning = false;
          return;
        }

        const finalReels = data.reels || data.symbols || [
          randomSymbolName(),
          randomSymbolName(),
          randomSymbolName()
        ];

        setReels(finalReels);

        lastWin = Number(data.payout || 0);
        balance = Number(data.balanceAfter || data.balance || balance);

        updateDisplay();

        if (lastWin > 0) {
          setStatus("Winner! Payout: " + money(lastWin) + " chips.", "good");
        } else {
          setStatus("No win. The house keeps this one.", "bad");
        }

      } catch (error) {
        const elapsed = Date.now() - startedAt;
        const waitMore = Math.max(0, 1100 - elapsed);
        await new Promise(resolve => setTimeout(resolve, waitMore));

        stopSpinAnimation();

        const fallbackReels = [
          randomSymbolName(),
          randomSymbolName(),
          randomSymbolName()
        ];

        setReels(fallbackReels);

        balance -= bet;
        lastWin = localCalculatePayout(fallbackReels, bet);
        balance += lastWin;

        updateDisplay();

        if (lastWin > 0) {
          setStatus("Local test win: " + money(lastWin) + " chips. API not connected.", "good");
        } else {
          setStatus("Local test spin. API not connected.", "bad");
        }
      }

      spinning = false;
    }

    document.getElementById("minusBet").addEventListener("click", () => {
      if (spinning) return;
      bet = Math.max(1000, bet - 1000);
      updateDisplay();
    });

    document.getElementById("plusBet").addEventListener("click", () => {
      if (spinning) return;
      bet = Math.min(10000, bet + 1000);
      updateDisplay();
    });

    document.getElementById("spinBtn").addEventListener("click", spinSlots);

    document.addEventListener("DOMContentLoaded", () => {
      getPlayerId();
      getPlayerSecret();

      setReels(["cherries", "seven", "bell"]);
      updateDisplay();
      loadWallet();
    });
  </script>
</body>
</html>
