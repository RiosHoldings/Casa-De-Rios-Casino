<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>Blackjack | Casino Casa de Ríos</title>

  <link rel="stylesheet" href="blackjack.css" />
</head>

<body>
  <main class="bj-stage" aria-label="Casino Casa de Ríos Blackjack">

    <!-- Full portrait background/UI image -->
    <img
      class="bj-bg"
      src="assets/blackjack-bg.jpeg"
      alt=""
      aria-hidden="true"
    />

    <!-- Invisible lobby/menu button over the baked hamburger -->
    <a class="bj-lobby-hotspot" href="index.html" aria-label="Return to lobby"></a>

    <!-- DEALER AREA -->
    <section class="bj-dealer-area" aria-label="Dealer hand">
      <div id="dealerCards" class="bj-card-row dealer-cards">
        <!-- JS renders dealer cards here -->
      </div>

      <div id="dealerTotal" class="bj-hand-total dealer-total">--</div>
    </section>

    <!-- PLAYER AREA -->
    <section class="bj-player-area" aria-label="Player hand">
      <div id="playerCards" class="bj-card-row player-cards">
        <!-- JS renders player cards here -->
      </div>

      <div id="playerTotal" class="bj-hand-total player-total">--</div>
    </section>

    <!-- MAIN BET CHIP MARKER -->
    <div id="mainBetChipLayer" class="main-bet-chip-layer" aria-hidden="true"></div>

    <!-- RESULT / STATUS BANNER -->
    <div id="gameMessage" class="bj-message" role="status">
      Place your bet.
    </div>

    <!-- MONEY VALUES OVER BAKED PANELS -->
    <section class="bj-values" aria-live="polite">
      <strong id="walletBalance" class="bj-value bj-balance">...</strong>
      <strong id="currentBet" class="bj-value bj-current-bet">$0</strong>
      <strong id="lastPayout" class="bj-value bj-last-win">$0</strong>
    </section>

    <!-- CHIP HOTSPOTS OVER BAKED CHIPS -->
    <section class="bj-chip-hotspots" aria-label="Chip selection">
      <button class="bj-chip-zone" style="left:21.5%" data-chip="50" aria-label="50 chip"></button>
      <button class="bj-chip-zone" style="left:35.5%" data-chip="100" aria-label="100 chip"></button>
      <button class="bj-chip-zone" style="left:50%" data-chip="250" aria-label="250 chip"></button>
      <button class="bj-chip-zone" style="left:64.5%" data-chip="500" aria-label="500 chip"></button>
      <button class="bj-chip-zone" style="left:78.5%" data-chip="1000" aria-label="1000 chip"></button>
    </section>

    <!-- CODED BUTTONS: STATE-BASED CONTROLS -->
    <section id="bjControls" class="bj-controls" aria-label="Blackjack controls">

      <!-- BETTING PHASE -->
      <div id="bettingControls" class="bj-control-row">
        <button id="clearBetBtn" class="bj-btn bj-btn-secondary">
          Clear
        </button>

        <button id="dealBtn" class="bj-btn bj-btn-primary">
          Deal
        </button>
      </div>

      <!-- PLAYING PHASE -->
      <div id="playingControls" class="bj-control-stack hidden">
        <div class="bj-control-row">
          <button id="hitBtn" class="bj-btn bj-btn-primary">
            Hit
          </button>

          <button id="standBtn" class="bj-btn bj-btn-primary">
            Stand
          </button>
        </div>

        <div class="bj-control-row bj-small-row">
          <button id="doubleBtn" class="bj-btn bj-btn-small">
            ×2 Double
          </button>

          <button id="splitBtn" class="bj-btn bj-btn-small" disabled>
            Split
          </button>
        </div>
      </div>

      <!-- RESULT PHASE -->
      <div id="resultControls" class="bj-control-row hidden">
        <button id="rebetBtn" class="bj-btn bj-btn-secondary">
          Rebet
        </button>

        <button id="newHandBtn" class="bj-btn bj-btn-primary">
          New Hand
        </button>
      </div>

    </section>

    <!-- Hidden input keeps JS/simple validation easy without showing ugly input UI -->
    <input id="betAmount" type="hidden" value="0" />

    <!-- Extra values for compatibility/debug, hidden visually -->
    <div class="bj-hidden-data" aria-hidden="true">
      <span id="playerStatus">Loading</span>
      <span id="vipTier">None</span>
      <span id="playerId">---</span>
      <span id="netChange">0</span>
      <div id="recentList"></div>
    </div>

    <div id="toast" class="bj-toast" role="status"></div>

  </main>

  <script src="blackjack.js"></script>
</body>
</html>
