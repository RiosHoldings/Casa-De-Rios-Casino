<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Casino Casa de Ríos — Blackjack</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #07050b;
      --panel: #140d1d;
      --panel2: #20122d;
      --gold: #d4a64a;
      --gold2: #f1d06a;
      --purple: #2d123d;
      --purple2: #4b1d63;
      --line: #5c3a73;
      --bone: #efe5d0;
      --muted: #ab9a8a;
      --green: #1f5a25;
      --red: #7a1d18;
      --black: #050407;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--bone);
      font-family: "Share Tech Mono", monospace;
    }

    body {
      background:
        radial-gradient(1100px 700px at 50% -10%, rgba(126, 51, 168, .26), transparent 60%),
        radial-gradient(900px 600px at 0% 100%, rgba(212, 166, 74, .14), transparent 60%),
        #07050b;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, .42);
      color: var(--bone);
      border-radius: 10px;
      padding: 10px 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-family: "Saira Condensed", sans-serif;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .08);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: .38;
      cursor: not-allowed;
      transform: none;
    }

    button.gold {
      border-color: rgba(212, 166, 74, .62);
      color: var(--gold2);
    }

    button.primary {
      background: linear-gradient(180deg, #d7b456, #9c711f);
      border-color: var(--gold);
      color: #120915;
    }

    button.hit {
      background: linear-gradient(180deg, #235d2c, #143b1c);
      border-color: #4e9b53;
    }

    button.stand {
      background: linear-gradient(180deg, #8a2a22, #55170f);
      border-color: #b5532a;
    }

    button.double {
      background: linear-gradient(180deg, #9c7a25, #5d4715);
      border-color: #d4a64a;
      color: #fff0c2;
    }

    button.cash {
      background: rgba(0, 0, 0, .55);
      border-color: rgba(212, 166, 74, .55);
      color: var(--gold2);
    }

    input {
      width: 100%;
      background: rgba(0, 0, 0, .45);
      border: 1px solid rgba(212, 166, 74, .3);
      color: var(--bone);
      border-radius: 8px;
      padding: 10px;
      outline: none;
    }

    .wrap {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 12px 10px 34px;
    }

    .topbar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid rgba(212, 166, 74, .18);
      border-radius: 16px;
      background: rgba(0, 0, 0, .24);
      backdrop-filter: blur(4px);
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
      flex: 1;
    }

    .brand-logo-img {
      width: 92px;
      height: 92px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(212, 166, 74, .45));
      flex-shrink: 0;
    }

    .brand-title {
      font-family: "Saira Condensed", sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--gold2);
      letter-spacing: .08em;
      font-size: clamp(28px, 6vw, 54px);
      line-height: .84;
      text-shadow: 0 0 16px rgba(212, 166, 74, .22);
    }

    .brand-sub {
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .iconbtn {
      min-width: 104px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }

    .status-strip {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 10px 0;
    }

    .info-card {
      border: 1px solid rgba(212, 166, 74, .22);
      background: rgba(0, 0, 0, .30);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .18);
      font-size: 13px;
      line-height: 1.65;
      text-transform: uppercase;
      letter-spacing: .10em;
      color: var(--bone);
    }

    .info-card b {
      color: var(--gold2);
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .table-panel {
      border: 1px solid rgba(212, 166, 74, .28);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(19, 11, 28, .92), rgba(8, 4, 12, .96));
      box-shadow: 0 24px 70px rgba(0, 0, 0, .42);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(212, 166, 74, .18);
      background: rgba(0, 0, 0, .22);
      font-family: "Saira Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 900;
      color: var(--gold2);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
      display: inline-block;
      margin-right: 8px;
    }

    .seat-text {
      color: var(--muted);
      font-size: 13px;
    }

    .game-table {
      position: relative;
      min-height: 900px;
      padding: 18px;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(22, 8, 34, .12), rgba(8, 3, 12, .10)),
        url("./images/casa-rios-bj.webp");
      background-size: 140% auto;
      background-position: center top;
      background-repeat: no-repeat;
      background-color: #07050b;
    }

    .game-table::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, transparent 0 45%, rgba(0, 0, 0, .18) 78%, rgba(0, 0, 0, .55) 100%);
      z-index: 0;
    }

    .floating {
      position: relative;
      z-index: 2;
    }

    .game-status {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 28px;
    }

    .mini-card {
      border: 1px solid rgba(212, 166, 74, .25);
      background: rgba(0, 0, 0, .34);
      border-radius: 12px;
      padding: 10px;
      min-width: 170px;
      color: var(--bone);
      line-height: 1.6;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .mini-card b {
      color: var(--gold2);
    }

    .mini-card.right {
      text-align: right;
    }

    .dealer-area,
    .player-area {
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(0, 0, 0, .16);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, .24);
    }

    .dealer-area {
      margin-top: 95px;
    }

    .player-area {
      margin-top: 120px;
    }

    .area-label {
      font-family: "Saira Condensed", sans-serif;
      font-size: 25px;
      font-weight: 900;
      letter-spacing: .14em;
      color: var(--gold2);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .cards {
      display: flex;
      gap: 10px;
      min-height: 112px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card {
      width: 74px;
      height: 104px;
      border-radius: 12px;
      background: #efe5d0;
      color: #111;
      position: relative;
      box-shadow:
        0 12px 24px rgba(0, 0, 0, .52),
        inset 0 0 0 2px rgba(255, 255, 255, .50);
      border: 1px solid rgba(0, 0, 0, .35);
      font-family: "Saira Condensed", sans-serif;
      font-weight: 900;
      overflow: hidden;
    }

    .card.red {
      color: #9e211a;
    }

    .card.back {
      background:
        radial-gradient(circle at 50% 50%, rgba(212, 166, 74, .24), transparent 42%),
        repeating-linear-gradient(45deg, #2d123d 0 8px, #1b0b27 8px 16px);
      border: 1px solid rgba(212, 166, 74, .55);
    }

    .card.back::after {
      content: "R";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--gold2);
      font-size: 42px;
      text-shadow: 0 0 12px rgba(212, 166, 74, .6);
    }

    .tl,
    .br {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: .9;
      font-size: 18px;
    }

    .tl {
      top: 8px;
      left: 8px;
    }

    .br {
      bottom: 8px;
      right: 8px;
      transform: rotate(180deg);
    }

    .pip {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 38px;
    }

    .message {
      max-width: 720px;
      min-height: 62px;
      margin: 28px auto;
      border: 1px solid rgba(212, 166, 74, .35);
      border-radius: 16px;
      padding: 14px;
      background: rgba(0, 0, 0, .62);
      color: var(--bone);
      font-size: 22px;
      line-height: 1.35;
      text-align: center;
      font-family: "Saira Condensed", sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .message.win {
      color: #91ff91;
      border-color: rgba(85, 190, 90, .55);
    }

    .message.loss {
      color: #ff8d7a;
      border-color: rgba(190, 70, 50, .55);
    }

    .message.push {
      color: var(--gold2);
    }

    .controls {
      position: relative;
      z-index: 3;
      margin: 28px auto 0;
      max-width: 820px;
      border: 1px solid rgba(212, 166, 74, .24);
      border-radius: 18px;
      background: rgba(0, 0, 0, .62);
      padding: 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .42);
    }

    .wager-dock {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .wager-box {
      border: 1px solid rgba(212, 166, 74, .32);
      border-radius: 14px;
      padding: 12px;
      background: rgba(0, 0, 0, .32);
      text-align: center;
    }

    .wager-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
    }

    .wager-value {
      font-family: "Saira Condensed", sans-serif;
      color: var(--gold2);
      font-weight: 900;
      font-size: 36px;
      line-height: 1;
      margin: 5px 0;
    }

    .balance {
      color: var(--bone);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .chip {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      padding: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, .18), transparent 32%),
        #24112f;
      color: #fff;
      border: 4px dashed rgba(255, 255, 255, .35);
      font-size: 18px;
    }

    .chip.c1 {
      background-color: #7a1d18;
    }

    .chip.c5 {
      background-color: #1f5a25;
    }

    .chip.c25 {
      background-color: #223e7a;
    }

    .chip.c100 {
      background-color: #25122e;
    }

    .chip.c500 {
      background-color: #9c711f;
      color: #180b02;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .action-grid button {
      min-height: 52px;
    }

    .cash-row {
      display: flex;
      justify-content: center;
      margin-top: 10px;
    }

    .cash-row button {
      min-width: 200px;
    }

    .footer-note {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    @media (max-width: 700px) {
      .wrap {
        padding: 8px 0 28px;
      }

      .topbar {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        margin-bottom: 0;
        padding: 10px 12px;
      }

      .brand-logo-img {
        width: 72px;
        height: 72px;
      }

      .brand-title {
        font-size: clamp(26px, 9vw, 44px);
      }

      .brand-sub {
        font-size: 9px;
      }

      .iconbtn {
        min-width: 92px;
        font-size: 14px;
        padding: 9px 8px;
      }

      .status-strip {
        margin: 8px 10px;
      }

      .table-panel {
        border-left: 0;
        border-right: 0;
        border-radius: 0;
      }

      .panel-head {
        padding: 10px 13px;
      }

      .game-table {
        min-height: 860px;
        padding: 10px 10px 18px;
        background-size: 145% auto;
        background-position: center top;
      }

      .game-status {
        margin-bottom: 14px;
      }

      .mini-card {
        font-size: 11px;
        min-width: auto;
        flex: 1;
        padding: 8px;
      }

      .dealer-area {
        margin-top: 82px;
      }

      .player-area {
        margin-top: 92px;
      }

      .area-label {
        font-size: 21px;
      }

      .cards {
        min-height: 96px;
      }

      .card {
        width: 64px;
        height: 90px;
      }

      .tl,
      .br {
        font-size: 15px;
      }

      .pip {
        font-size: 31px;
      }

      .message {
        font-size: 21px;
        margin: 22px auto;
      }

      .wager-dock {
        grid-template-columns: 1fr;
        margin: 0 0 10px;
      }

      .chip {
        width: 54px;
        height: 54px;
        font-size: 15px;
      }

      .action-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo-img" src="./images/casa-rios-logo.webp" alt="Casa de Ríos Logo" />
        <div>
          <div class="brand-title">Casa de Ríos</div>
          <div class="brand-sub">Suerte · Honor · Lealtad<br>RP currency only</div>
        </div>
      </div>

      <div class="top-actions">
        <button class="iconbtn gold" id="returnLobbyTopBtn">↩ Return<br>Lobby</button>
      </div>
    </header>

    <section class="status-strip">
      <div class="info-card" id="rulesCard">Loading wallet...</div>
    </section>

    <main class="table-panel">
      <div class="panel-head">
        <div><span class="dot"></span>The Table</div>
        <div class="seat-text" id="seatText">Seat: Loading</div>
      </div>

      <div class="game-table">
        <div class="floating game-status">
          <div class="mini-card" id="leftGameInfo">
            Blackjack pays <b>3:2</b><br>
            Min Bet: <b>1</b><br>
            Max Bet: <b>50,000</b>
          </div>

          <div class="mini-card right" id="rightGameInfo">
            Seat: <b>---</b><br>
            Shoe: <b>House</b>
          </div>
        </div>

        <section class="floating dealer-area">
          <div class="area-label">
            <span>Dealer</span>
            <span id="dealerTotal">Total: ?</span>
          </div>
          <div id="dealerCards" class="cards"></div>
        </section>

        <div id="gameMessage" class="floating message">
          Place your bet and press Deal.
        </div>

        <section class="floating player-area">
          <div class="area-label">
            <span>You</span>
            <span id="playerTotal">Total: 0</span>
          </div>
          <div id="playerCards" class="cards"></div>
        </section>

        <section class="controls" id="controls"></section>
      </div>
    </main>

    <div class="footer-note">
      Casa de Ríos is for DayZ RP currency only.
    </div>
  </div>

  <script>
    const PLAYER_KEY = "casa_rios_player_id";
    const PLAYER_SECRET_KEY = "casa_rios_player_secret";

    let currentBlackjackHandId = null;
    let currentBet = 100;
    let lastWalletBalance = 0;
    let walletLocked = false;
    let lastPlayerHandLength = 0;

    function money(n) {
      return Number(n || 0).toLocaleString();
    }

    function getPlayerId() {
      return localStorage.getItem(PLAYER_KEY) || "";
    }

    function getPlayerSecret() {
      return localStorage.getItem(PLAYER_SECRET_KEY) || "";
    }

    function goLobby() {
      window.location.href = "./index.html";
    }

    function setText(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function setHTML(id, html) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = html;
    }

    function setMessage(text, type = "") {
      const el = document.getElementById("gameMessage");
      if (!el) return;

      el.className = "floating message" + (type ? " " + type : "");
      el.textContent = text;
    }

    function renderIdentity() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      if (!playerId || !playerSecret) {
        setText("seatText", "Seat: Not created");
        setHTML(
          "rightGameInfo",
          "Seat: <b>Return to Lobby</b><br>Shoe: <b>House</b>"
        );
        setHTML(
          "rulesCard",
          "<b>No player loaded.</b><br><span class='small'>Return to the lobby and use Create / Update Player first.</span>"
        );
        return;
      }

      const shortId = playerId.slice(0, 12) + "...";

      setText("seatText", "Seat: " + shortId);
      setHTML(
        "rightGameInfo",
        "Seat: <b>" + shortId + "</b><br>Shoe: <b>House</b>"
      );
    }

    function cardHTML(card) {
      if (!card || card.hidden || card.rank === "?") {
        return `<div class="card back"></div>`;
      }

      const red = card.suit === "♥" || card.suit === "♦";
      const cls = red ? "card red" : "card";

      return `
        <div class="${cls}">
          <div class="tl">
            <span class="rank">${card.rank}</span>
            <span class="suit">${card.suit}</span>
          </div>

          <div class="pip">${card.suit}</div>

          <div class="br">
            <span class="rank">${card.rank}</span>
            <span class="suit">${card.suit}</span>
          </div>
        </div>
      `;
    }

    function renderCards(id, cards) {
      const box = document.getElementById(id);
      if (!box) return;

      box.innerHTML = (cards || []).map(cardHTML).join("");
    }

    async function loadWallet() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      renderIdentity();

      if (!playerId || !playerSecret) {
        lastWalletBalance = 0;
        walletLocked = false;
        renderControls();
        return;
      }

      try {
        const response = await fetch(
          "/api/wallet?playerId=" +
          encodeURIComponent(playerId) +
          "&playerSecret=" +
          encodeURIComponent(playerSecret)
        );

        const data = await response.json();

        if (!data.ok) {
          setHTML(
            "rulesCard",
            "<b>Wallet unavailable.</b><br><span class='small'>" + data.error + "</span>"
          );
          lastWalletBalance = 0;
          walletLocked = false;
          renderControls();
          return;
        }

        const p = data.player;
        lastWalletBalance = Number(p.chips || 0);
        walletLocked = Number(p.locked || 0) === 1;

        setHTML(
          "rulesCard",
          "<b>Wallet:</b> " + money(lastWalletBalance) + " chips<br>" +
          "<b>Status:</b> " + p.status +
          " · <b>VIP:</b> " + p.vip_tier +
          " · <b>Locked:</b> " + (walletLocked ? "Yes" : "No")
        );

        renderControls();
      } catch (error) {
        setHTML(
          "rulesCard",
          "<b>Wallet request failed.</b><br><span class='small'>Check deployment.</span>"
        );
        renderControls();
      }
    }

    function renderControls() {
      const active = !!currentBlackjackHandId;
      const canDouble = active && lastPlayerHandLength === 2;

      setHTML("controls", `
        <div class="wager-dock">
          <div class="wager-box">
            <div class="wager-label">Wager</div>
            <div class="wager-value" id="wagerValue">${money(currentBet)}</div>
            <div class="balance" id="walletMini">Wallet: ${money(lastWalletBalance)} chips</div>
          </div>

          <div>
            <div class="chip-row">
              <button class="chip c1" data-chip="100" ${active ? "disabled" : ""}>100</button>
              <button class="chip c5" data-chip="500" ${active ? "disabled" : ""}>500</button>
              <button class="chip c25" data-chip="1000" ${active ? "disabled" : ""}>1K</button>
              <button class="chip c100" data-chip="5000" ${active ? "disabled" : ""}>5K</button>
              <button class="chip c500" data-chip="10000" ${active ? "disabled" : ""}>10K</button>
            </div>

            <div class="small" style="margin-top:8px;text-align:center;">
              Tap a chip to set your bet. Max blackjack bet: 50,000.
            </div>
          </div>
        </div>

        <div class="action-grid">
          <button class="primary" id="dealBtn" ${active || walletLocked ? "disabled" : ""}>Deal</button>
          <button class="hit" id="hitBtn" ${active ? "" : "disabled"}>Hit</button>
          <button class="stand" id="standBtn" ${active ? "" : "disabled"}>Stand</button>
          <button class="double" id="doubleBtn" ${canDouble ? "" : "disabled"}>Double</button>
        </div>

        <div class="cash-row">
          <button class="cash" id="backLobbyBtn">Back to Lobby</button>
        </div>
      `);

      document.querySelectorAll("[data-chip]").forEach(button => {
        button.addEventListener("click", () => {
          currentBet = Number(button.dataset.chip || 100);
          renderControls();
        });
      });

      const dealBtn = document.getElementById("dealBtn");
      const hitBtn = document.getElementById("hitBtn");
      const standBtn = document.getElementById("standBtn");
      const doubleBtn = document.getElementById("doubleBtn");
      const backLobbyBtn = document.getElementById("backLobbyBtn");

      if (dealBtn) dealBtn.addEventListener("click", startBlackjack);
      if (hitBtn) hitBtn.addEventListener("click", () => blackjackAction("hit"));
      if (standBtn) standBtn.addEventListener("click", () => blackjackAction("stand"));
      if (doubleBtn) doubleBtn.addEventListener("click", () => blackjackAction("double"));
      if (backLobbyBtn) backLobbyBtn.addEventListener("click", goLobby);
    }

    function renderBlackjack(data) {
      const dealerCards = data.dealerHandPublic || [];
      const playerCards = data.playerHand || [];

      lastPlayerHandLength = playerCards.length;

      renderCards("dealerCards", dealerCards);
      renderCards("playerCards", playerCards);

      setText("playerTotal", "Total: " + (data.playerTotal ?? 0));

      if (data.status === "settled") {
        setText("dealerTotal", "Total: " + (data.dealerTotal ?? "?"));
      } else {
        setText("dealerTotal", "Total: ?");
      }

      if (data.status === "settled") {
        currentBlackjackHandId = null;
        lastWalletBalance = Number(data.balanceAfter || lastWalletBalance);

        let type = "";

        if (data.result === "win" || data.result === "blackjack") {
          type = "win";
        } else if (data.result === "push") {
          type = "push";
        } else {
          type = "loss";
        }

        setMessage(
          (data.message || "Hand settled.") +
          " | Result: " + (data.result || "settled") +
          " | Payout: " + money(data.payout) +
          " | Balance: " + money(data.balanceAfter),
          type
        );
      } else {
        currentBlackjackHandId = data.handId;
        setMessage(data.message || "Choose Hit, Stand, or Double.");
      }

      renderControls();
      loadWallet();
    }

    async function startBlackjack() {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      if (!playerId || !playerSecret) {
        setMessage("Return to the lobby and create/update player first.", "loss");
        return;
      }

      if (walletLocked) {
        setMessage("Wallet is locked.", "loss");
        return;
      }

      if (!currentBet || currentBet <= 0) {
        setMessage("Choose a valid bet.", "loss");
        return;
      }

      setMessage("Dealing from the Casa de Ríos shoe...");

      try {
        const response = await fetch("/api/blackjack-start", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            playerId,
            playerSecret,
            betAmount: currentBet
          })
        });

        const data = await response.json();

        if (!data.ok) {
          setMessage("Failed: " + data.error, "loss");
          return;
        }

        renderBlackjack(data);
      } catch (error) {
        setMessage("Blackjack deal failed. Check deployment.", "loss");
      }
    }

    async function blackjackAction(action) {
      const playerId = getPlayerId();
      const playerSecret = getPlayerSecret();

      if (!playerId || !playerSecret) {
        setMessage("Return to the lobby and create/update player first.", "loss");
        return;
      }

      if (!currentBlackjackHandId) {
        setMessage("Deal a hand first.", "loss");
        return;
      }

      setMessage("Sending action to the house...");

      try {
        const response = await fetch("/api/blackjack-action", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            playerId,
            playerSecret,
            handId: currentBlackjackHandId,
            action
          })
        });

        const data = await response.json();

        if (!data.ok) {
          setMessage("Failed: " + data.error, "loss");
          return;
        }

        renderBlackjack(data);
      } catch (error) {
        setMessage("Blackjack action failed. Check deployment.", "loss");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const topBtn = document.getElementById("returnLobbyTopBtn");
      if (topBtn) topBtn.addEventListener("click", goLobby);

      renderIdentity();
      renderCards("dealerCards", [{ hidden: true }]);
      renderCards("playerCards", [{ hidden: true }]);
      renderControls();
      loadWallet();
    });
  </script>
</body>
</html>
